  <head>
    <meta charset="UTF-8" />
    <!--
      Security headers (CSP, X-Frame-Options, HSTS, etc.) are delivered as HTTP
      response headers via vercel.json so they apply at the right layer and
      frame-ancestors actually enforces. CSP ships report-only; flip the
      vercel.json key to "Content-Security-Policy" once the browser console
      shows no legitimate violations across all pages (incl. Settings/WhatsApp).
    -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
